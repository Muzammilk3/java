name: java-project
on:
  push:
    branches: "master"

jobs:
  build-java-project:
    runs-on: ubuntu-latest

    steps:
      - name: checkout github repository
        uses: actions/checkout@v7.0.0

      - name: setup java repository
        uses: actions/setup-java@v5.5.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: compile java project
        run: javac Test.java

      - name: run java project
        run: java Test
